title: Milos Vasic
tagline: Senior Software Engineer — SDK & Platform Engineering
description: >-
  Milos Vasic — Senior Software Engineer specializing in SDK and platform
  engineering across mobile, backend, desktop, and web. 15+ years building
  high-performance, developer-facing software. Author of Fundamental Kotlin.
author: Milos Vasic
url: "https://milosvasic.ru"
lang: en

# Custom theme (no remote/gem theme — fully self-contained layouts + assets)
# SEO — Open Graph, Twitter Card, structured data (generated by jekyll-seo-tag)
twitter:
  username: # TODO: add Twitter/X handle if desired
social:
  name: Milos Vasic
  links:
    - https://github.com/milos85vasic
    - https://gitlab.com/milos85vasic
    - https://t.me/milos85vasic
logo: /assets/images/profile-square-800.jpg

# Default OG image for all pages (used when no page-specific image is set)
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/profile-square-800.jpg

plugins:
  - jekyll-seo-tag
  - jekyll-feed

# Build hygiene
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - README.pdf
  - LICENSE
  - start.sh
  - vendor
  - Upstreamable
  - Upstreams
  - .run
  - downloads/src

sass:
  style: compressed
