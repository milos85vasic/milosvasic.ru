# Custom GitHub Pages workflow — replaces the default "pages build and deployment"
# action so we can set submodules: false. The Upstreamable submodule has a broken
# nested gitlink (Upstreamable/Upstreamable with no .gitmodules URL) that causes
# the default recursive checkout to fail. Upstreamable is excluded from the Jekyll
# build (_config.yml line 43) so submodules are not needed at all.
name: Deploy Jekyll to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false    # Upstreamable has a broken nested gitlink; excluded from build anyway
      - uses: actions/configure-pages@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec jekyll build --destination _site
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
